<div class="content-panel pt-5 px-10 bg-gray-800 min-h-screen">
  <div id="header" class="flex items-center">
    <img src="../assets/logo.png" alt="Final Girl Logo" class="w-48 h-24 object-fit rounded-md mr-8" />
    <div>
      <p-togglebutton
        [(ngModel)]="isSignature"
        onIcon="pi pi-check"
        onLabel="Signature"
        offIcon="pi pi-times"
        offLabel="Signature"
        [class.toggle-on]="isSignature"
        [class.toggle-off]="!isSignature"
        (onChange)="signatureChange()"
      />
      <p-select
        [options]="killer"
        [(ngModel)]="selectedKiller"
        optionLabel="name"
        placeholder="Select a Killer"
        class="ml-5 w-full md:w-56"
        (onChange)="changeKiller()"
      />
      <p-select
        [options]="location"
        [(ngModel)]="selectedLocation"
        optionLabel="name"
        placeholder="Select a Location"
        class="ml-5 w-full md:w-56"
        (onChange)="changeLocation()"
      />
      <p-select
        [options]="girl"
        [(ngModel)]="selectedGirl"
        optionLabel="name"
        placeholder="Select a Girl"
        class="ml-5 w-full md:w-56"
        (onChange)="changeGirl()"
      />
    </div>
  </div>
  <div class="flex justify-between items-center">
    <div class="w-[75%]">
      <div class="card mt-5">
        <span class="font-bold text-lg text-white">Total: {{ playActions.length }}</span>
        <p-picklist
          [source]="playActions"
          [target]="discardActions"
          [dragdrop]="true"
          [responsive]="true"
          (onSourceSelect)="onPlayActionSelect($event)"
          sourceFilterPlaceholder="Search by name"
          targetFilterPlaceholder="Search by name"
          showSourceControls="false"
          showTargetControls="false"
          breakpoint="1400px"
          scrollHeight="20rem"
        >
          <ng-template pTemplate="sourceHeader">
            <div class="font-bold text-center text-red-600 text-xl py-2">Play Actions</div>
          </ng-template>
          <ng-template pTemplate="targetHeader">
            <div class="font-bold text-center text-red-600 text-xl py-2">Discard</div>
          </ng-template>
          <ng-template let-action let-selected="selected" #item>
            <div
              class="flex justify-between w-full items-center cursor-pointer"
              (mouseenter)="onActionMouseEnter(action)"
              (mouseleave)="onActionMouseLeave()"
            >
              <span class="font-bold text-lg mr-2">{{ action.name }}</span>
              <span class="font-bold text-lg sm:ml-8">{{ ' $' + action.cost }}</span>
            </div>
          </ng-template>
        </p-picklist>
      </div>
      <div class="card mt-5">
        <p-picklist
          [source]="tableauActions"
          [target]="handActions"
          [dragdrop]="true"
          [responsive]="true"
          (onSourceSelect)="onTableauActionSelect($event)"
          sourceFilterPlaceholder="Search by name"
          targetFilterPlaceholder="Search by name"
          showSourceControls="false"
          showTargetControls="false"
          breakpoint="1400px"
          scrollHeight="20rem"
        >
          <ng-template pTemplate="sourceHeader">
            <div class="font-bold text-center text-red-600 text-xl py-2">Tableau</div>
          </ng-template>
          <ng-template pTemplate="targetHeader">
            <div class="font-bold text-center text-red-600 text-xl py-2">Hand</div>
          </ng-template>
          <ng-template let-action let-selected2="selected2" #item>
            <div
              class="flex justify-between w-full items-center cursor-pointer"
              (mouseenter)="onActionMouseEnter(action)"
              (mouseleave)="onActionMouseLeave()"
            >
              <span class="font-bold text-xl mr-2">{{ action.name }}</span>
              <span class="font-bold text-xl sm:ml-8">{{ ' $' + action.cost }}</span>
            </div>
          </ng-template>
        </p-picklist>
      </div>
      <div class="flex justify-end">
        <p-button
          label="Take All Free Cards"
          (onClick)="takeFreeCards()"
          [unstyled]="true"
          class="m-5"
          [pt]="{
            root: 'bg-cyan-700 hover:bg-cyan-800 active:bg-cyan-900 cursor-pointer py-2 px-4 rounded-full border-0 flex gap-2',
            label: 'text-white font-bold text-lg',
            icon: 'text-white !text-xl',
          }"
        />
        <p-button
          label="End Turn"
          (onClick)="endTurn()"
          [unstyled]="true"
          class="m-5"
          [pt]="{
            root: 'bg-red-700 hover:bg-wine-800 active:bg-wine-900 cursor-pointer py-2 px-4 rounded-full border-0 flex gap-2',
            label: 'text-white font-bold text-lg',
            icon: 'text-white !text-xl',
          }"
        />
      </div>
    </div>
    <div class="w-[20%]">
      @if (hoveredActionImg) {
        <img
          [src]="hoveredActionImg ? '../assets/' + hoveredActionImg + '.png' : ''"
          alt="Selected Killer"
          class="w-full h-auto object-cover rounded-md mb-4"
        />
      }
    </div>
  </div>
</div>
